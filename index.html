<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>HS EDITS</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Poppins;
overflow:hidden;
}

/* INTRO */

#intro{

position:fixed;
width:100%;
height:100vh;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

background:black;

z-index:10;

}

/* BEAT FLASH */

.flash{

position:absolute;
width:100%;
height:100%;

background:white;
opacity:0;

animation:beatFlash 0.6s infinite;

}

@keyframes beatFlash{

0%{opacity:0}
10%{opacity:0.3}
20%{opacity:0}
40%{opacity:0.2}
60%{opacity:0}
100%{opacity:0}

}

/* LOGO */

.logo{

font-family:Bebas Neue;
font-size:200px;

letter-spacing:15px;

background:linear-gradient(90deg,#666,#fff,#666);

-webkit-background-clip:text;
color:transparent;

opacity:0;

position:relative;

animation:logoReveal 4s forwards;

}

/* METAL SHINE */

.logo::after{

content:"";

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:linear-gradient(120deg,
transparent,
rgba(255,255,255,0.8),
transparent);

animation:shine 3s infinite;

}

@keyframes shine{

0%{left:-100%}
100%{left:120%}

}

@keyframes logoReveal{

0%{
opacity:0;
transform:scale(0.4);
}

40%{
opacity:1;
}

100%{
transform:scale(1.3);
}

}

/* PORTFOLIO */

#portfolio{

display:none;

padding:120px;

text-align:center;

background:black;

min-height:100vh;

}

h2{

font-weight:300;
font-size:38px;

margin-bottom:120px;

}

/* REELS */

.netflix{

display:flex;
gap:20px;
overflow-x:auto;

padding:20px;

}

.netflix iframe{

width:320px;
height:570px;

border:none;

border-radius:10px;

transition:0.4s;

}

.netflix iframe:hover{

transform:scale(1.08);

}

/* PHOTOS */

.gallery{

display:flex;
gap:30px;
justify-content:center;
flex-wrap:wrap;

}

.gallery img{

width:380px;

border-radius:12px;

transition:0.5s;

}

.gallery img:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<audio id="music" src="song.mp3"></audio>

<section id="intro">

<div class="flash"></div>

<h1 class="logo">HS EDITS</h1>

</section>

<section id="portfolio">

<h2>An editor who cant edit his own life</h2>

<h1>Featured Reels</h1>

<div class="netflix">

<iframe src="https://www.instagram.com/reel/DSulN0HEwlp/embed"></iframe>
<iframe src="https://www.instagram.com/reel/DSGuRxIk9_I/embed"></iframe>
<iframe src="https://www.instagram.com/reel/DTlaj39jQmP/embed"></iframe>
<iframe src="https://www.instagram.com/reel/DRWlM2Xkz-C/embed"></iframe>
<iframe src="https://www.instagram.com/reel/DDrl7g2hiI6/embed"></iframe>

</div>

<h1>Photography</h1>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">

</div>

</section>

<script>

const music = document.getElementById("music")

window.onload = () => {

music.volume = 1
music.play()

setTimeout(()=>{

document.getElementById("intro").style.display="none"

document.body.style.overflow="auto"

document.getElementById("portfolio").style.display="block"

music.volume = 0.2

},6000)

}

</script>

</body>
</html>
